name: CI/CD Practica Profesional ms-gestion-matricula
# Trigger deployment
on:
  push:
    branches: ['despliegue-de-pruebas']

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: |
          sed -i 's/\r$//' mvnw || true
          chmod +x mvnw || true
          ./mvnw clean package -DskipTests

      - name: Login Dockerhub
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin

      - name: Build and push Docker image
        run: |
          docker build -t $DOCKER_USERNAME/practica-profesional-gestion-matricula:latest .
          docker push $DOCKER_USERNAME/practica-profesional-gestion-matricula:latest

  deploy:
    runs-on: self-hosted
    needs: build
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      BD_USER: ${{ secrets.BD_USER }}
      BD_PASSWORD: ${{ secrets.BD_PASSWORD }}

    steps:
      - name: Create Docker Network
        run: |
          docker network create --driver bridge --opt com.docker.network.driver.mtu=1400 maestria-network || echo "Network already exists"

      - name: Ensure Eureka Discovery Server is Running (directory)
        run: |
          if [ -z "$(docker ps -a -q -f name=directory-service)" ]; then
            echo "Creating and starting directory-service container..."
            docker run -d \
              --name "directory-service" \
              --network "maestria-network" \
              --network-alias "directory" \
              -p 8765:8761 \
              --restart "always" \
              --memory "256m" \
              --memory-swap "256m" \
              --label project="practica-u" \
              --label service="directory" \
              -e JAVA_TOOL_OPTIONS="-Dfile.encoding=UTF-8 -XX:+UseSerialGC -Xms64m -Xmx192m" \
              $DOCKER_USERNAME/practica-profesional-directory:latest
          else
            echo "directory-service container exists, ensuring it is started..."
            docker start directory-service
          fi

      - name: Ensure MySQL Database Container is Running
        run: |
          if [ -z "$(docker ps -a -q -f name=mysql-db)" ]; then
            echo "Creating and starting mysql-db container..."
            docker run -d \
              --name "mysql-db" \
              --network "maestria-network" \
              -p 3307:3306 \
              --restart "always" \
              --memory "512m" \
              --memory-swap "1g" \
              -e MYSQL_ROOT_PASSWORD="$BD_PASSWORD" \
              -e MYSQL_USER="$BD_USER" \
              -e MYSQL_PASSWORD="$BD_PASSWORD" \
              -e MYSQL_DATABASE="maestria-computacion" \
              -v mysql_maestria_data:/var/lib/mysql \
              mysql:8.0 \
                --character-set-server=utf8mb4 \
                --collation-server=utf8mb4_unicode_ci \
                --innodb_buffer_pool_size=128M \
                --innodb_log_buffer_size=4M \
                --max-allowed-packet=128M \
                --skip-name-resolve \
                --performance_schema=OFF \
                --innodb_buffer_pool_instances=1 \
                --max_connections=64 \
                --skip-mysqlx
          else
            echo "mysql-db container exists, ensuring it is started..."
            docker start mysql-db
          fi

      - name: Infrastructure Diagnosis & Cleanup
        run: |
          echo "--- DISK SPACE CHECK ---"
          df -h || true
          echo "--- CLEANING OLD CONTAINER ---"
          docker rm -f ms-gestion-matricula-service || true

      - name: Pull Application Image (with Retry Logic)
        run: |
          echo "Attempting to pull image with auto-retry for stability..."
          for i in 1 2 3; do
            docker pull $DOCKER_USERNAME/practica-profesional-gestion-matricula:latest && exit 0 || \
            (echo "Attempt $i failed, waiting 10s..." && sleep 10)
          done
          echo "All pull attempts failed."
          exit 1

      - name: Run Application Container
        run: |
          docker run -d \
            --name "ms-gestion-matricula-service" \
            --network "maestria-network" \
            --network-alias "ms-gestion-matricula" \
            --restart "always" \
            --memory "320m" \
            --memory-swap "320m" \
            --label project="practica-u" \
            --label service="ms-gestion-matricula" \
            -e SPRING_PROFILES_ACTIVE="dev" \
            -e EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE="http://directory:8761/eureka/" \
            -e EUREKA_CLIENT_SERVICEURL_DEFAULTZONE="http://directory:8761/eureka/" \
            -e SPRING_DATASOURCE_URL="jdbc:mysql://mysql-db:3306/maestria-computacion?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Bogota" \
            -e SPRING_DATASOURCE_USERNAME="$BD_USER" \
            -e SPRING_DATASOURCE_PASSWORD="$BD_PASSWORD" \
            -e JAVA_TOOL_OPTIONS="-Dfile.encoding=UTF-8 -XX:+UseSerialGC -Xms64m -Xmx256m" \
            $DOCKER_USERNAME/practica-profesional-gestion-matricula:latest

      - name: Clean Old Images of This Service
        run: |
          echo "Cleaning old images for ms-gestion-matricula service..."
          CURRENT_IMAGE=$(docker inspect ms-gestion-matricula-service --format='{{.Image}}' 2>/dev/null || echo "")
          if [ -n "$CURRENT_IMAGE" ]; then
            docker images --filter "label=service=ms-gestion-matricula" --format "{{.ID}}" | while read img; do
              if [ "$img" != "${CURRENT_IMAGE:7:12}" ]; then
                echo "Removing old image: $img"
                docker rmi -f $img 2>/dev/null || true
              fi
            done
          fi
          docker images $DOCKER_USERNAME/practica-profesional-gestion-matricula --format "{{.ID}} {{.Tag}}" | grep -v "latest" | awk '{print $1}' | xargs -r docker rmi -f 2>/dev/null || true

      - name: Clean Stopped Containers of This Service
        run: |
          echo "Cleaning stopped containers for ms-gestion-matricula service..."
          docker ps -a --filter "label=service=ms-gestion-matricula" --filter "status=exited" -q | xargs -r docker rm 2>/dev/null || true

      - name: Final Status Check
        run: |
          sleep 5
          docker ps | grep ms-gestion-matricula-service || true
          echo "--- LAST 20 LINES OF LOGS ---"
          docker logs --tail 20 ms-gestion-matricula-service || true
