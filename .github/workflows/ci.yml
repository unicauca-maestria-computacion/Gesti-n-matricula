name: CI Practica Profesional ms-gestion-matricula

on:
  push:
    branches: ['despliegue-de-pruebas']

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: |
          sed -i 's/\r$//' mvnw || true
          chmod +x mvnw || true
          ./mvnw clean package -DskipTests

      - name: Login Dockerhub
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin

      - name: Build and push Docker image
        run: |
          docker build -t $DOCKER_USERNAME/practica-profesional-gestion-matricula:latest .
          docker push $DOCKER_USERNAME/practica-profesional-gestion-matricula:latest
